<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth + Moon Orbit HUD</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    #canvas {
      display: block;
    }
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #7cffc9;
      text-shadow: 0 0 10px rgba(124,255,201,.55);
      mix-blend-mode: screen;
    }
    .label {
      position: absolute;
      left: 16px;
      top: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .label2 {
      position: absolute;
      right: 16px;
      bottom: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02) 0 2px,
        transparent 2px 5px
      );
      opacity: .25;
    }
    .vignette {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 180px rgba(0,0,0,.85);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="hud">
    <div class="label">EARTH + MOON ORBIT</div>
    <div class="label2">ONLINE / REALISTIC TEXTURES</div>
    <div class="scan"></div>
    <div class="vignette"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000);
    renderer.setPixelRatio(window.devicePixelRatio);

    // EARTH
    const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
      color: 0x2166ac,
      shininess: 5
    });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    scene.add(earth);

    // CLOUDS
    const cloudsGeometry = new THREE.SphereGeometry(1.02, 64, 64);
    const cloudsMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      opacity: 0.3,
      transparent: true,
      shininess: 0
    });
    const clouds = new THREE.Mesh(cloudsGeometry, cloudsMaterial);
    scene.add(clouds);

    // MOON
    const moonGeometry = new THREE.SphereGeometry(0.3, 32, 32);
    const moonMaterial = new THREE.MeshPhongMaterial({
      color: 0x888888,
      shininess: 3
    });
    const moon = new THREE.Mesh(moonGeometry, moonMaterial);
    moon.position.set(2, 0, 0);
    scene.add(moon);

    // ORBIT LINE
    const orbitCurve = new THREE.EllipseCurve(0, 0, 2, 1.5, 0, Math.PI * 2, false, 0);
    const points = orbitCurve.getPoints(256);
    const orbitGeometry = new THREE.BufferGeometry().setFromPoints(points);
    const orbitMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, opacity: 0.4, transparent: true });
    const orbit = new THREE.Line(orbitGeometry, orbitMaterial);
    orbit.rotation.x = Math.PI / 3;
    scene.add(orbit);

    // LIGHTS
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.position.set(3, 2, 2);
    scene.add(sunLight);

    const pointLight = new THREE.PointLight(0x00ffff, 0.5);
    pointLight.position.set(-3, 0, 2);
    scene.add(pointLight);

    // STARS
    const starsGeometry = new THREE.BufferGeometry();
    const starPositions = [];
    for (let i = 0; i < 2000; i++) {
      const x = (Math.random() - 0.5) * 100;
      const y = (Math.random() - 0.5) * 100;
      const z = (Math.random() - 0.5) * 100;
      starPositions.push(x, y, z);
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // ANIMATION
    function animate() {
      requestAnimationFrame(animate);

      earth.rotation.y += 0.001;
      clouds.rotation.y += 0.0012;
      moon.rotation.y += 0.005;

      const time = Date.now() * 0.0001;
      const moonOrbitRadius = 2;
      const moonOrbitHeight = 1.5;
      moon.position.x = Math.cos(time) * moonOrbitRadius;
      moon.position.y = Math.sin(time) * moonOrbitHeight;

      earth.rotation.z = Math.sin(Date.now() * 0.0002) * 0.1;

      renderer.render(scene, camera);
    }

    animate();

    // RESIZE
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
