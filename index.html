<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth + Moon Orbit HUD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle at center, #09131f 0%, #020407 58%, #000 100%);
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }

    #scene {
      position: fixed;
      inset: 0;
    }

    /* ── HUD shell ── */
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #7cffc9;
      text-shadow: 0 0 10px rgba(124,255,201,.55);
      mix-blend-mode: screen;
    }

    /* CRT scanlines */
    .scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02) 0 2px,
        transparent 2px 5px
      );
      opacity: .25;
    }

    /* Edge vignette */
    .vignette {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 180px rgba(0,0,0,.85);
    }

    /* Corner labels */
    .label-tl {
      position: absolute;
      left: 16px; top: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .label-br {
      position: absolute;
      right: 16px; bottom: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }

    /* Panels */
    .panel {
      position: absolute;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(124,255,201,.55);
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 11px;
      line-height: 1.7;
      pointer-events: all;
    }

    .panel strong {
      display: block;
      margin-bottom: 4px;
      letter-spacing: .1em;
      font-size: 12px;
    }

    .info-panel  { right: 16px; top: 16px;  min-width: 210px; }
    .ctrl-panel  { left:  16px; bottom: 16px; }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 7px 10px;
      background: rgba(124,255,201,.08);
      border: 1px solid rgba(124,255,201,.6);
      border-radius: 3px;
      color: #7cffc9;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: .06em;
      cursor: pointer;
      text-align: left;
      transition: background .2s, text-shadow .2s;
    }
    .btn:hover        { background: rgba(124,255,201,.22); }
    .btn.active       { background: rgba(124,255,201,.38); text-shadow: 0 0 12px #7cffc9; }

    /* Telemetry rows */
    .tele-row { display: flex; justify-content: space-between; gap: 12px; }
    .tele-val { color: #fff; }
  </style>
</head>
<body>

<div id="scene"></div>

<div class="hud">
  <div class="label-tl">EARTH + MOON ORBIT SYSTEM</div>
  <div class="label-br">ONLINE / REALISTIC TEXTURES</div>

  <div class="panel info-panel">
    <strong>TELEMETRY</strong>
    <div class="tele-row"><span>Distance</span><span class="tele-val" id="moonDistance">384 400 km</span></div>
    <div class="tele-row"><span>Speed</span><span class="tele-val" id="moonSpeed">1.022 km/s</span></div>
    <div class="tele-row"><span>Rotation</span><span class="tele-val" id="earthRotation">0.0 °</span></div>
    <div class="tele-row"><span>Time (UTC)</span><span class="tele-val" id="systemTime">--:--:--</span></div>
    <div class="tele-row"><span>Zoom</span><span class="tele-val" id="zoomLevel">4.20 ×</span></div>
  </div>

  <div class="panel ctrl-panel">
    <strong>CONTROLS</strong>
    <div>🖱 DRAG = Rotate &nbsp;|&nbsp; SCROLL = Zoom</div>
    <div>W A S D = Pan &nbsp;|&nbsp; SPACE = Auto-rotate</div>
    <div>P = Pause &nbsp;|&nbsp; R = Reset &nbsp;|&nbsp; V = Wireframe</div>
    <button class="btn active" id="autoBtn">AUTO ROTATE: ON</button>
    <button class="btn"        id="pauseBtn">PAUSE: OFF</button>
  </div>

  <div class="scan"></div>
  <div class="vignette"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script>
'use strict';

/* ─── Renderer ─────────────────────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('scene').appendChild(renderer.domElement);

/* ─── Scene / Camera ────────────────────────────────────────────────────── */
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0, 4.2);

/* ─── Root group (rotated by mouse) ─────────────────────────────────────── */
const root = new THREE.Group();
scene.add(root);

/* ─── Texture loader ────────────────────────────────────────────────────── */
const loader = new THREE.TextureLoader();
// Aggiornato il base URL a un CDN che permette il CORS
const BASE = 'https://cdn.jsdelivr.net/npm/three@0.161.0/examples/textures/planets/';

const texEarth  = loader.load(BASE + 'earth_atmos_2048.jpg');
// Three.js usa la normal map nei suoi esempi ufficiali
const texNormal = loader.load(BASE + 'earth_normal_2048.jpg'); 
const texSpec   = loader.load(BASE + 'earth_specular_2048.jpg');
const texClouds = loader.load(BASE + 'earth_clouds_1024.png');
const texMoon   = loader.load(BASE + 'moon_1024.jpg');

/* ═══════════════════════════════════════════════════════════════════════════
   🌍  EARTH
══════════════════════════════════════════════════════════════════════════ */
const earthGroup = new THREE.Group();
root.add(earthGroup);

// Tilted 23.5° on its axis
earthGroup.rotation.z = THREE.MathUtils.degToRad(23.5);

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.MeshStandardMaterial({
    map:          texEarth,
    normalMap:    texNormal, // Sostituito bumpMap con normalMap
    normalScale:  new THREE.Vector2(0.8, 0.8), // Aggiustata l'intensità
    roughnessMap: texSpec,
    roughness:    0.85,
    metalness:    0.02
  })
);
earthGroup.add(earth);

// Clouds
const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.012, 96, 96),
  new THREE.MeshStandardMaterial({
    map:         texClouds,
    transparent: true,
    opacity:     0.75,
    depthWrite:  false
  })
);
earthGroup.add(clouds);

// Atmospheric glow (BackSide)
const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.09, 64, 64),
  new THREE.MeshBasicMaterial({
    color:       0x4ef7ff,
    transparent: true,
    opacity:     0.10,
    side:        THREE.BackSide
  })
);
earthGroup.add(atmosphere);

/* ─── Auroras ────────────────────────────────────────────────────────────── */
function makeAurora(color, rotX) {
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(1.13, 0.07, 12, 256),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.30 })
  );
  m.rotation.x = rotX;
  earthGroup.add(m);
  return m;
}
const aurora1 = makeAurora(0x00ff88, Math.PI * 0.30);
const aurora2 = makeAurora(0xff00ff, Math.PI * 0.70);

/* ═══════════════════════════════════════════════════════════════════════════
   🌙  MOON  (orbits root, not earthGroup so axial tilt doesn't compound)
══════════════════════════════════════════════════════════════════════════ */
const moonOrbit = new THREE.Group();
root.add(moonOrbit);

// Orbit ring (visual guide)
(function buildMoonPath() {
  const curve = new THREE.EllipseCurve(0, 0, 2.2, 1.55, 0, Math.PI * 2);
  const pts   = curve.getPoints(256);
  const verts = new Float32Array(pts.length * 3);
  pts.forEach((p, i) => { verts[i*3]=p.x; verts[i*3+1]=p.y; verts[i*3+2]=0; });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color:0x4ef7ff, transparent:true, opacity:0.20 }));
  line.rotation.x = Math.PI / 2.6;
  moonOrbit.add(line);
})();

const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.27, 48, 48),
  new THREE.MeshStandardMaterial({ map: texMoon, roughness: 1, metalness: 0 })
);
root.add(moon);   // moon lives directly on root so we can place it freely

/* ═══════════════════════════════════════════════════════════════════════════
   🪐  SATURN
══════════════════════════════════════════════════════════════════════════ */
const saturnGroup = new THREE.Group();
saturnGroup.position.set(4.5, 1.4, -2.5);
root.add(saturnGroup);

const saturnBody = new THREE.Mesh(
  new THREE.SphereGeometry(0.38, 48, 48),
  new THREE.MeshStandardMaterial({ color: 0xf4d67f, roughness: 0.65, metalness: 0.06 })
);
saturnGroup.add(saturnBody);

const saturnRing = new THREE.Mesh(
  new THREE.TorusGeometry(0.72, 0.14, 4, 120),
  new THREE.MeshStandardMaterial({ color: 0xe8d5b7, roughness: 0.9, metalness: 0.08, side: THREE.DoubleSide })
);
saturnRing.rotation.x = Math.PI * 0.38;
saturnGroup.add(saturnRing);

/* ═══════════════════════════════════════════════════════════════════════════
   🛰️  SATELLITES  (3 — orbit at moderate distance, in camera view)
══════════════════════════════════════════════════════════════════════════ */
const SAT_COLORS  = [0xff4444, 0x44ff44, 0x4488ff];
const SAT_RADII   = [1.6, 1.9, 2.2];
const SAT_HEIGHTS = [0.25, -0.20, 0.10];
const SAT_SPEEDS  = [0.009, 0.007, 0.005];

const satellites = SAT_COLORS.map((col, i) => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.045, 12, 12),
    new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.6, roughness: 0.5 })
  );
  mesh.userData = { dist: SAT_RADII[i], angle: (i / 3) * Math.PI * 2, speed: SAT_SPEEDS[i], h: SAT_HEIGHTS[i] };
  root.add(mesh);
  return mesh;
});

/* ═══════════════════════════════════════════════════════════════════════════
   ☄️  COMETS  (2 — with proper trail buffer)
══════════════════════════════════════════════════════════════════════════ */
const TRAIL_LEN = 30;

const comets = [0, 1].map(i => {
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xffff99 })
  );

  body.userData = {
    angle:    Math.random() * Math.PI * 2,
    dist:     5.5 + i * 2.0,
    speed:    0.0012 + i * 0.0005,
    trailBuf: new Float32Array(TRAIL_LEN * 3)
  };

  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(body.userData.trailBuf, 3));

  const trail = new THREE.Line(
    trailGeo,
    new THREE.LineBasicMaterial({ color: 0xffff66, transparent: true, opacity: 0.35 })
  );

  body.userData.trail = trail;
  root.add(body);
  root.add(trail);
  return body;
});

/* ═══════════════════════════════════════════════════════════════════════════
   ⭐  STARS  (3 000 — coloured + pulsing)
══════════════════════════════════════════════════════════════════════════ */
(function buildStars() {
  const N       = 3000;
  const pos     = new Float32Array(N * 3);
  const col     = new Float32Array(N * 3);
  const palette = [new THREE.Color(0xbfffee), new THREE.Color(0x7fc9ff), new THREE.Color(0xff9999)];

  for (let i = 0; i < N; i++) {
    const r  = 20 + Math.random() * 35;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(Math.random() * 2 - 1);
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    pos[i*3+2] = r * Math.cos(ph);

    const c = palette[Math.random() < 0.6 ? 0 : Math.random() < 0.5 ? 1 : 2];
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

  scene.add(new THREE.Points(
    geo,
    new THREE.PointsMaterial({ size: 0.04, sizeAttenuation: true, vertexColors: true })
  ));
})();

/* ═══════════════════════════════════════════════════════════════════════════
   🌪️  SPACE DUST
══════════════════════════════════════════════════════════════════════════ */
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(1200 * 3);
for (let i = 0; i < dustPos.length; i++) dustPos[i] = (Math.random() - 0.5) * 22;
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(
  dustGeo,
  new THREE.PointsMaterial({ color: 0xffffff, size: 0.018, sizeAttenuation: true, transparent: true, opacity: 0.35 })
);
scene.add(dust);

/* ═══════════════════════════════════════════════════════════════════════════
   🌌  NEBULA
══════════════════════════════════════════════════════════════════════════ */
const nebula = new THREE.Mesh(
  new THREE.SphereGeometry(85, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0x4a148c, transparent: true, opacity: 0.06, side: THREE.BackSide })
);
scene.add(nebula);

/* ─── Lights ─────────────────────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0xffffff, 0.9));

const sunLight = new THREE.DirectionalLight(0xfff8e7, 3.0);
sunLight.position.set(6, 2, 5);
scene.add(sunLight);

scene.add(Object.assign(new THREE.PointLight(0x48ffd1, 1.2, 30), { position: new THREE.Vector3(-4, 1, -2) }));

/* ─── Interaction state ──────────────────────────────────────────────────── */
const S = {
  drag: false, autoRotate: true, paused: false, wireframe: false,
  tgtX: 0, tgtY: 0, rotX: 0, rotY: 0,
  keys: {}
};

/* Mouse drag */
document.addEventListener('mousedown', () => S.drag = true);
document.addEventListener('mouseup',   () => S.drag = false);
document.addEventListener('mousemove', e => {
  if (!S.drag) return;
  S.tgtY += e.movementX * 0.005;
  S.tgtX += e.movementY * 0.005;
  S.autoRotate = false;
  syncAutoBtn();
});

/* Scroll zoom */
document.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z = Math.max(2, Math.min(10, camera.position.z + e.deltaY * 0.003));
}, { passive: false });

/* Keyboard */
document.addEventListener('keydown', e => {
  S.keys[e.key.toLowerCase()] = true;
  if (e.key === ' ')                 { S.autoRotate = !S.autoRotate; syncAutoBtn(); }
  if (e.key.toLowerCase() === 'p') { S.paused = !S.paused; syncPauseBtn(); }
  if (e.key.toLowerCase() === 'r') { camera.position.set(0,0,4.2); S.tgtX=S.tgtY=0; }
  if (e.key.toLowerCase() === 'v') {
    S.wireframe = !S.wireframe;
    [earth.material, moon.material, clouds.material].forEach(m => m.wireframe = S.wireframe);
  }
});
document.addEventListener('keyup', e => S.keys[e.key.toLowerCase()] = false);

/* Button helpers */
const autoBtn  = document.getElementById('autoBtn');
const pauseBtn = document.getElementById('pauseBtn');

function syncAutoBtn()  { autoBtn.textContent  = 'AUTO ROTATE: '+(S.autoRotate?'ON':'OFF'); autoBtn.classList.toggle('active',S.autoRotate); }
function syncPauseBtn() { pauseBtn.textContent = 'PAUSE: '+(S.paused?'ON':'OFF');            pauseBtn.classList.toggle('active',S.paused); }

autoBtn.addEventListener('click',  () => { S.autoRotate = !S.autoRotate; syncAutoBtn(); });
pauseBtn.addEventListener('click', () => { S.paused     = !S.paused;     syncPauseBtn(); });

/* ─── Animation loop ─────────────────────────────────────────────────────── */
let moonAngle = 0;
const PAN = 0.02;

function animate() {
  requestAnimationFrame(animate);

  if (!S.paused) {
    const t = Date.now();

    /* Camera pan */
    if (S.keys['w']) camera.position.y -= PAN;
    if (S.keys['s']) camera.position.y += PAN;
    if (S.keys['a']) camera.position.x -= PAN;
    if (S.keys['d']) camera.position.x += PAN;

    /* Auto-rotate */
    if (S.autoRotate) S.tgtY += 0.0003;

    /* Smooth rotation */
    S.rotX += (S.tgtX - S.rotX) * 0.1;
    S.rotY += (S.tgtY - S.rotY) * 0.1;
    root.rotation.x = S.rotX;
    root.rotation.y = S.rotY;

    /* 🌍 Earth */
    earth.rotation.y  += 0.0035;
    clouds.rotation.y += 0.0048;

    /* 🌈 Auroras */
    aurora1.rotation.y  += 0.0006;
    aurora2.rotation.y  -= 0.0004;
    aurora1.material.opacity = 0.22 + Math.sin(t * 0.001)  * 0.10;
    aurora2.material.opacity = 0.22 + Math.cos(t * 0.0012) * 0.10;

    /* 🌙 Moon — elliptical orbit */
    moonAngle += 0.002;
    moon.position.set(
      Math.cos(moonAngle) * 2.2,
      Math.sin(moonAngle * 0.5) * 0.18,   // slight vertical wobble
      Math.sin(moonAngle) * 1.55
    );
    moon.rotation.y += 0.006;

    /* 🪐 Saturn */
    saturnGroup.rotation.y += 0.0004;

    /* 🛰️ Satellites */
    saturnGroup.rotation.y += 0.0004;
    satellites.forEach(s => {
      s.userData.angle += s.userData.speed;
      const { dist, angle, h } = s.userData;
      s.position.set(
        Math.cos(angle) * dist,
        h + Math.sin(t * 0.0006) * 0.08,
        Math.sin(angle) * dist
      );
      s.rotation.y += 0.03;
    });

    /* ☄️ Comets */
    comets.forEach(c => {
      c.userData.angle += c.userData.speed;
      const { angle, dist, trailBuf, trail } = c.userData;
      const cx = Math.cos(angle) * dist;
      const cy = Math.sin(t * 0.00015) * 1.5;
      const cz = Math.sin(angle) * dist;

      // Shift trail back by 1 position
      trailBuf.copyWithin(3, 0);
      trailBuf[0] = cx; trailBuf[1] = cy; trailBuf[2] = cz;
      trail.geometry.attributes.position.needsUpdate = true;
      // Recompute draw range so only filled entries show
      trail.geometry.setDrawRange(0, TRAIL_LEN);

      c.position.set(cx, cy, cz);
      c.rotation.y += 0.04;
    });

    /* 🌪️ Dust / 🌌 Nebula / ⭐ Stars */
    dust.rotation.y   += 0.00003;
    nebula.rotation.y += 0.000025;
  }

  /* ── HUD telemetry ── */
  const now = new Date();
  document.getElementById('moonDistance').textContent =
    (384400 + Math.round(Math.sin(Date.now() * 0.0003) * 200)).toLocaleString('it') + ' km';
  document.getElementById('moonSpeed').textContent =
    (1.022 + Math.sin(Date.now() * 0.001) * 0.012).toFixed(3) + ' km/s';
  document.getElementById('earthRotation').textContent =
    ((Date.now() * 0.01) % 360).toFixed(1) + ' °';
  document.getElementById('systemTime').textContent =
    [now.getUTCHours(), now.getUTCMinutes(), now.getUTCSeconds()]
      .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('zoomLevel').textContent =
    camera.position.z.toFixed(2) + ' ×';

  renderer.render(scene, camera);
}

animate();

/* ─── Resize ─────────────────────────────────────────────────────────────── */
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
