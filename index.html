<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth + Moon Orbit HUD</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #09131f 0%, #020407 58%, #000 100%);
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    #scene {
      position: fixed;
      inset: 0;
    }
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #7cffc9;
      text-shadow: 0 0 10px rgba(124,255,201,.55);
      mix-blend-mode: screen;
    }
    .label {
      position: absolute;
      left: 16px;
      top: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .label2 {
      position: absolute;
      right: 16px;
      bottom: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02) 0 2px,
        transparent 2px 5px
      );
      opacity: .25;
    }
    .vignette {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 180px rgba(0,0,0,.85);
    }
  </style>
</head>
<body>
  <div id="scene"></div>
  <div class="hud">
    <div class="label">EARTH + MOON ORBIT</div>
    <div class="label2">ONLINE / REALISTIC TEXTURES</div>
    <div class="scan"></div>
    <div class="vignette"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('scene').appendChild(renderer.domElement);

    const root = new THREE.Group();
    scene.add(root);

    const earthGroup = new THREE.Group();
    root.add(earthGroup);

    const textureLoader = new THREE.TextureLoader();

    // Earth con colore base visibile
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(1, 96, 96),
      new THREE.MeshStandardMaterial({
        color: 0x2a5aa4,
        metalness: 0.1,
        roughness: 0.8
      })
    );
    earthGroup.add(earth);

    // Carica texture earth in background
    textureLoader.load(
      'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
      (texture) => {
        earth.material.map = texture;
        earth.material.needsUpdate = true;
      }
    );

    // Clouds
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(1.01, 96, 96),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.4,
        depthWrite: false,
        metalness: 0,
        roughness: 1
      })
    );
    earthGroup.add(clouds);

    textureLoader.load(
      'https://threejs.org/examples/textures/planets/earth_clouds_1024.png',
      (texture) => {
        clouds.material.map = texture;
        clouds.material.needsUpdate = true;
      }
    );

    // Atmosphere
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.08, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x4ef7ff,
        transparent: true,
        opacity: 0.1,
        side: THREE.BackSide
      })
    );
    earthGroup.add(atmosphere);

    // Moon Orbit
    const moonOrbit = new THREE.Group();
    root.add(moonOrbit);

    // Moon orbit line
    const orbitGeometry = new THREE.BufferGeometry();
    const orbitPoints = [];
    for (let i = 0; i <= 256; i++) {
      const angle = (i / 256) * Math.PI * 2;
      const x = Math.cos(angle) * 2.2;
      const y = Math.sin(angle) * 1.55;
      orbitPoints.push(x, y, 0);
    }
    orbitGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(orbitPoints), 3));
    const moonPath = new THREE.Line(
      orbitGeometry,
      new THREE.LineBasicMaterial({ color: 0x4ef7ff, transparent: true, opacity: 0.3 })
    );
    moonPath.rotation.x = Math.PI / 2.6;
    moonOrbit.add(moonPath);

    // Moon
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(0.27, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0xb0b0b0,
        roughness: 0.95,
        metalness: 0
      })
    );
    moonOrbit.add(moon);

    textureLoader.load(
      'https://threejs.org/examples/textures/planets/moon_1024.jpg',
      (texture) => {
        moon.material.map = texture;
        moon.material.needsUpdate = true;
      }
    );

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1.8);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    const rim = new THREE.PointLight(0x48ffd1, 0.8, 50);
    rim.position.set(-4, 1, -2);
    scene.add(rim);

    // Stars
    const starsGeo = new THREE.BufferGeometry();
    const starCount = 2500;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 18 + Math.random() * 35;
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos((Math.random() * 2) - 1);
      starPos[i * 3] = r * Math.sin(ph) * Math.cos(th);
      starPos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
      starPos[i * 3 + 2] = r * Math.cos(ph);
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starsGeo,
      new THREE.PointsMaterial({ color: 0xbfffee, size: 0.05, sizeAttenuation: true })
    );
    scene.add(stars);

    function animate() {
      requestAnimationFrame(animate);

      earth.rotation.y += 0.0008;
      clouds.rotation.y += 0.001;
      atmosphere.rotation.y -= 0.0003;

      moonOrbit.rotation.z += 0.002;
      moon.position.set(2.2, 0, 0);
      moon.rotation.y += 0.005;

      root.rotation.x = Math.sin(Date.now() * 0.00025) * 0.05;
      root.rotation.y = Math.sin(Date.now() * 0.00012) * 0.08;

      stars.rotation.y += 0.00005;

      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
