<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth + Moon Orbit HUD - Advanced</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at center, #09131f 0%, #020407 58%, #000 100%);
      overflow: hidden;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #7cffc9;
      text-shadow: 0 0 10px rgba(124,255,201,.55);
      mix-blend-mode: screen;
    }
    .label {
      position: absolute;
      left: 16px;
      top: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .label2 {
      position: absolute;
      right: 16px;
      bottom: 16px;
      letter-spacing: .16em;
      font-size: 13px;
    }
    .info-panel {
      position: absolute;
      right: 16px;
      top: 16px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #7cffc9;
      padding: 12px;
      font-size: 11px;
      line-height: 1.6;
      max-width: 250px;
      border-radius: 4px;
    }
    .controls-panel {
      position: absolute;
      left: 16px;
      bottom: 16px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #7cffc9;
      padding: 12px;
      font-size: 11px;
      line-height: 1.8;
      border-radius: 4px;
    }
    .scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02) 0 2px,
        transparent 2px 5px
      );
      opacity: .25;
    }
    .vignette {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 180px rgba(0,0,0,.85);
    }
    .button {
      background: rgba(124,255,201,0.1);
      border: 1px solid #7cffc9;
      color: #7cffc9;
      padding: 8px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      margin-top: 8px;
      transition: all 0.3s;
    }
    .button:hover {
      background: rgba(124,255,201,0.3);
      text-shadow: 0 0 10px rgba(124,255,201,1);
    }
    .button.active {
      background: rgba(124,255,201,0.5);
      text-shadow: 0 0 15px rgba(124,255,201,1);
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="label">EARTH + MOON ORBIT SYSTEM</div>
    <div class="label2">ONLINE / REALISTIC TEXTURES</div>
    
    <div class="info-panel" id="infoPanel">
      <div><strong>SYSTEM INFO</strong></div>
      <div id="moonDistance">Distance: 384,400 km</div>
      <div id="moonSpeed">Speed: 1.022 km/s</div>
      <div id="earthRotation">Rotation: 23.5°</div>
      <div id="systemTime">Time: --:--:--</div>
      <div id="zoomLevel">Zoom: 4.00x</div>
    </div>

    <div class="controls-panel">
      <div><strong>CONTROLS</strong></div>
      <div>🖱️ DRAG = Rotate | SCROLL = Zoom</div>
      <div>W/A/S/D = Pan | SPACE = Auto-rotate</div>
      <div>P = Pause | R = Reset | V = Wireframe</div>
      <button class="button active" id="bloomBtn">Bloom: ON</button>
      <button class="button active" id="autoRotateBtn">Auto Rotate: ON</button>
    </div>
    
    <div class="scan"></div>
    <div class="vignette"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ========== CONFIGURAZIONE SCENE ==========
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 0.5, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, precision: 'highp' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    renderer.gammaOutput = true;
    renderer.gammaFactor = 2.2;
    document.body.appendChild(renderer.domElement);

    // ========== TEXTURE LOADER ==========
    const textureLoader = new THREE.TextureLoader();

    // ========== TERRA - MOLTO PIÙ LUMINOSA ==========
    const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
    const earthMaterial = new THREE.MeshPhongMaterial({
      color: 0x4a7ba7,
      emissive: 0x1a3a4a,
      shininess: 50,
      wireframe: false
    });

    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    scene.add(earth);

    textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', (t) => {
      t.anisotropy = 16;
      earth.material.map = t;
      earth.material.needsUpdate = true;
    });

    textureLoader.load('https://threejs.org/examples/textures/planets/earth_bump_2048.jpg', (t) => {
      earth.material.bumpMap = t;
      earth.material.bumpScale = 0.08;
      earth.material.needsUpdate = true;
    });

    // ========== NUVOLE VISIBILI ==========
    const cloudsGeometry = new THREE.SphereGeometry(1.018, 128, 128);
    const cloudsMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.6,
      depthWrite: false,
      shininess: 5,
      emissive: 0x555555
    });
    const clouds = new THREE.Mesh(cloudsGeometry, cloudsMaterial);
    scene.add(clouds);

    textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png', (t) => {
      clouds.material.map = t;
      clouds.material.needsUpdate = true;
    });

    // ========== ATMOSFERA CON AURORE BOREALI ==========
    const atmosphereGeometry = new THREE.SphereGeometry(1.08, 64, 64);
    const atmosphereMaterial = new THREE.MeshPhongMaterial({
      color: 0x4ef7ff,
      transparent: true,
      opacity: 0.2,
      side: THREE.BackSide,
      emissive: 0x2a7f99
    });
    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    scene.add(atmosphere);

    // Aurore boreali - anelli luminosi
    const auroraGeometry = new THREE.TorusGeometry(1.1, 0.08, 16, 100);
    const auroraMaterial = new THREE.MeshBasicMaterial({
      color: 0x00ff88,
      transparent: true,
      opacity: 0.4,
      emissive: 0x00ff88
    });
    const aurora1 = new THREE.Mesh(auroraGeometry, auroraMaterial);
    aurora1.rotation.x = Math.PI * 0.3;
    scene.add(aurora1);

    const aurora2 = new THREE.Mesh(auroraGeometry.clone(), auroraMaterial.clone());
    aurora2.rotation.x = Math.PI * 0.7;
    aurora2.material.color.setHex(0xff00ff);
    aurora2.material.emissive.setHex(0xff00ff);
    scene.add(aurora2);

    // ========== LUNA VISIBILE ==========
    const moonGeometry = new THREE.SphereGeometry(0.27, 64, 64);
    const moonMaterial = new THREE.MeshPhongMaterial({
      color: 0xcccccc,
      emissive: 0x444444,
      shininess: 30
    });
    const moon = new THREE.Mesh(moonGeometry, moonMaterial);
    scene.add(moon);

    textureLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg', (t) => {
      moon.material.map = t;
      moon.material.needsUpdate = true;
    });

    // ========== ORBITA DELLA LUNA ==========
    const orbitCurve = new THREE.EllipseCurve(0, 0, 2.2, 1.55, 0, Math.PI * 2, false, 0);
    const orbitPoints = orbitCurve.getPoints(256);
    const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
    const orbitMaterial = new THREE.LineBasicMaterial({
      color: 0x4ef7ff,
      transparent: true,
      opacity: 0.5,
      linewidth: 2
    });
    const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
    orbitLine.rotation.x = Math.PI / 2.6;
    scene.add(orbitLine);

    // ========== SATURNO (CON ANELLI) ==========
    const saturnGeometry = new THREE.SphereGeometry(0.4, 48, 48);
    const saturnMaterial = new THREE.MeshPhongMaterial({
      color: 0xf4d67f,
      emissive: 0x665533,
      shininess: 20
    });
    const saturn = new THREE.Mesh(saturnGeometry, saturnMaterial);
    saturn.position.set(4, 1.2, -2);
    scene.add(saturn);

    // Anelli di Saturno
    const ringGeometry = new THREE.TorusGeometry(0.75, 0.15, 16, 100);
    const ringMaterial = new THREE.MeshPhongMaterial({
      color: 0xe8d5b7,
      emissive: 0x664422,
      shininess: 30
    });
    const saturnRing = new THREE.Mesh(ringGeometry, ringMaterial);
    saturnRing.rotation.x = Math.PI * 0.4;
    saturn.add(saturnRing);

    // ========== SATELLITI LUMINOSI ==========
    const satellites = [];
    for (let i = 0; i < 3; i++) {
      const satGeometry = new THREE.SphereGeometry(0.1, 16, 16);
      const hue = i / 3;
      const satMaterial = new THREE.MeshPhongMaterial({
        color: new THREE.Color().setHSL(hue, 0.9, 0.6),
        emissive: new THREE.Color().setHSL(hue, 0.9, 0.4),
        shininess: 50
      });
      const satellite = new THREE.Mesh(satGeometry, satMaterial);
      
      const distance = 3 + i * 0.5;
      const angle = (i / 3) * Math.PI * 2;
      satellite.userData = {
        distance: distance,
        angle: angle,
        speed: 0.005 + Math.random() * 0.003,
        height: (Math.random() - 0.5) * 0.5
      };
      
      scene.add(satellite);
      satellites.push(satellite);
    }

    // Luci per satelliti
    const satLight1 = new THREE.PointLight(0xff0088, 0.5, 30);
    scene.add(satLight1);
    const satLight2 = new THREE.PointLight(0x0088ff, 0.5, 30);
    scene.add(satLight2);
    const satLight3 = new THREE.PointLight(0xffff00, 0.5, 30);
    scene.add(satLight3);

    // ========== COMETE BRILLANTI ==========
    const comets = [];
    for (let i = 0; i < 2; i++) {
      const cometGeometry = new THREE.SphereGeometry(0.15, 16, 16);
      const cometMaterial = new THREE.MeshBasicMaterial({
        color: 0xffff88,
        emissive: 0xffff00
      });
      const comet = new THREE.Mesh(cometGeometry, cometMaterial);
      
      const angle = Math.random() * Math.PI * 2;
      const distance = 5 + Math.random() * 3;
      comet.userData = {
        angle: angle,
        distance: distance,
        speed: 0.001 + Math.random() * 0.001,
        trailLength: 20
      };

      // Scia della cometa
      const trailGeometry = new THREE.BufferGeometry();
      const trailPositions = [];
      for (let j = 0; j < comet.userData.trailLength; j++) {
        trailPositions.push(0, 0, 0);
      }
      trailGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(trailPositions), 3));
      
      const trailMaterial = new THREE.LineBasicMaterial({
        color: 0xffff88,
        transparent: true,
        opacity: 0.6,
        linewidth: 3
      });
      const trail = new THREE.Line(trailGeometry, trailMaterial);
      
      comet.userData.trail = trail;
      comet.userData.trailPositions = trailPositions;

      scene.add(comet);
      scene.add(trail);
      comets.push(comet);
    }

    // Luci comete
    const cometLight1 = new THREE.PointLight(0xffff00, 1, 40);
    scene.add(cometLight1);
    const cometLight2 = new THREE.PointLight(0xffff88, 1, 40);
    scene.add(cometLight2);

    // ========== PARTICELLE SPAZIALI (POLVERE) ==========
    const dustGeometry = new THREE.BufferGeometry();
    const dustPositions = [];
    const dustCount = 1500;

    for (let i = 0; i < dustCount; i++) {
      dustPositions.push(
        (Math.random() - 0.5) * 25,
        (Math.random() - 0.5) * 25,
        (Math.random() - 0.5) * 25
      );
    }

    dustGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPositions), 3));
    const dustMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.05,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.6
    });
    const dust = new THREE.Points(dustGeometry, dustMaterial);
    scene.add(dust);

    // ========== NEBULE COLORATE ==========
    const nebulaeGeometry = new THREE.SphereGeometry(100, 32, 32);
    const nebulaMaterial = new THREE.MeshBasicMaterial({
      color: 0x2a148c,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide
    });
    const nebula = new THREE.Mesh(nebulaeGeometry, nebulaMaterial);
    scene.add(nebula);

    // ========== STELLE DI SFONDO CON ANIMAZIONI ==========
    const starsData = [];
    const starCount = 4000;

    for (let i = 0; i < starCount; i++) {
      const r = 60 + Math.random() * 120;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 2 - 1);

      const colorType = Math.random();
      let color;
      if (colorType < 0.6) {
        color = 0xffffff;
      } else if (colorType < 0.8) {
        color = 0x7fc9ff;
      } else {
        color = 0xff9999;
      }

      starsData.push({
        x: r * Math.sin(phi) * Math.cos(theta),
        y: r * Math.sin(phi) * Math.sin(theta),
        z: r * Math.cos(phi),
        color: color,
        baseSize: Math.random() * 0.2 + 0.08,
        pulseSpeed: Math.random() * 0.02 + 0.01,
        pulseAmount: Math.random() * 0.1 + 0.03,
        phase: Math.random() * Math.PI * 2
      });
    }

    const starsGeometry = new THREE.BufferGeometry();
    const starPositions = [];
    const starColors = [];

    starsData.forEach(star => {
      starPositions.push(star.x, star.y, star.z);
      const c = new THREE.Color(star.color);
      starColors.push(c.r, c.g, c.b);
    });

    starsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
    starsGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(starColors), 3));

    const starsMaterial = new THREE.PointsMaterial({
      size: 0.15,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true
    });

    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // ========== LUCI PRINCIPALI ==========
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
    sunLight.position.set(5, 3, 5);
    sunLight.castShadow = true;
    scene.add(sunLight);

    const rimLight = new THREE.PointLight(0x48ffd1, 1.5, 60);
    rimLight.position.set(-4, 1, -2);
    scene.add(rimLight);

    const skyLight = new THREE.PointLight(0x4ef7ff, 0.8, 50);
    skyLight.position.set(0, 5, 0);
    scene.add(skyLight);

    // ========== CONTROLLI E STATO ==========
    const state = {
      mouse: { x: 0, y: 0 },
      targetRotation: { x: 0, y: 0 },
      isDragging: false,
      isAutoRotating: true,
      isPaused: false,
      isWireframe: false,
      panX: 0,
      panY: 0,
      time: 0
    };

    // ========== EVENT LISTENERS ==========
    document.addEventListener('mousedown', () => {
      state.isDragging = true;
    });

    document.addEventListener('mouseup', () => {
      state.isDragging = false;
    });

    document.addEventListener('mousemove', (e) => {
      state.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      state.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      if (state.isDragging) {
        state.targetRotation.y += e.movementX * 0.005;
        state.targetRotation.x += e.movementY * 0.005;
        state.isAutoRotating = false;
      }
    });

    document.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.position.z += e.deltaY * 0.003;
      camera.position.z = Math.max(1.5, Math.min(10, camera.position.z));
    }, { passive: false });

    // ========== KEYBOARD CONTROLS ==========
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key.toLowerCase() === ' ') {
        state.isAutoRotating = !state.isAutoRotating;
        document.getElementById('autoRotateBtn').classList.toggle('active');
      }
      if (e.key.toLowerCase() === 'p') {
        state.isPaused = !state.isPaused;
      }
      if (e.key.toLowerCase() === 'r') {
        state.targetRotation = { x: 0, y: 0 };
        camera.position.set(0, 0.5, 3.5);
        state.panX = 0;
        state.panY = 0;
      }
      if (e.key.toLowerCase() === 'v') {
        state.isWireframe = !state.isWireframe;
        toggleWireframe();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // ========== BUTTONS ==========
    document.getElementById('bloomBtn').addEventListener('click', function() {
      this.classList.toggle('active');
      this.textContent = this.classList.contains('active') ? 'Bloom: ON' : 'Bloom: OFF';
    });

    document.getElementById('autoRotateBtn').addEventListener('click', function() {
      state.isAutoRotating = !state.isAutoRotating;
      this.classList.toggle('active');
      this.textContent = 'Auto Rotate: ' + (state.isAutoRotating ? 'ON' : 'OFF');
    });

    // ========== WIREFRAME TOGGLE ==========
    function toggleWireframe() {
      earth.material.wireframe = state.isWireframe;
      moon.material.wireframe = state.isWireframe;
      clouds.material.wireframe = state.isWireframe;
      saturn.material.wireframe = state.isWireframe;
    }

    // ========== ANIMAZIONE PRINCIPALE ==========
    let moonAngle = 0;
    let sceneRotationX = 0;
    let sceneRotationY = 0;

    function animate() {
      requestAnimationFrame(animate);

      if (!state.isPaused) {
        state.time += 0.016;

        // Controlli WASD
        const panSpeed = 0.02;
        if (keys['w']) state.panY -= panSpeed;
        if (keys['s']) state.panY += panSpeed;
        if (keys['a']) state.panX -= panSpeed;
        if (keys['d']) state.panX += panSpeed;

        // Auto-rotate
        if (state.isAutoRotating) {
          state.targetRotation.y += 0.0002;
        }

        // Interpolazione smooth rotazione
        sceneRotationX += (state.targetRotation.x - sceneRotationX) * 0.1;
        sceneRotationY += (state.targetRotation.y - sceneRotationY) * 0.1;

        // Applica rotazioni
        earth.rotation.y += 0.0005;
        earth.rotation.x = sceneRotationX;
        earth.rotation.z += Math.sin(state.time * 0.0001) * 0.0002;

        clouds.rotation.y += 0.0007;
        clouds.rotation.x = sceneRotationX;

        atmosphere.rotation.y -= 0.0002;
        atmosphere.rotation.x = sceneRotationX;

        // Aurore boreali
        aurora1.rotation.x += 0.0005;
        aurora1.rotation.y += 0.0003;
        aurora1.material.opacity = 0.3 + Math.sin(state.time * 0.002) * 0.15;

        aurora2.rotation.x -= 0.0003;
        aurora2.rotation.y += 0.0005;
        aurora2.material.opacity = 0.3 + Math.cos(state.time * 0.0025) * 0.15;

        // Orbita Luna
        moonAngle += 0.002;
        moon.position.x = Math.cos(moonAngle) * 2.2;
        moon.position.z = Math.sin(moonAngle) * 1.55 * Math.cos(Math.PI / 2.6);
        moon.position.y = Math.sin(moonAngle) * 1.55 * Math.sin(Math.PI / 2.6);
        moon.rotation.y += 0.003;
        moon.rotation.x = sceneRotationX;

        // Orbita line
        orbitLine.rotation.x = Math.PI / 2.6 + sceneRotationX;

        // Saturno rotazione
        saturn.rotation.y += 0.0003;
        saturn.rotation.x = sceneRotationX * 0.5;

        // Satelliti
        satellites.forEach((satellite, idx) => {
          satellite.userData.angle += satellite.userData.speed;
          satellite.position.x = Math.cos(satellite.userData.angle) * satellite.userData.distance;
          satellite.position.y = satellite.userData.height + Math.sin(state.time * 0.002) * 0.2;
          satellite.position.z = Math.sin(satellite.userData.angle) * satellite.userData.distance;
          satellite.rotation.y += 0.01;

          // Aggiorna luci satelliti
          const lights = [satLight1, satLight2, satLight3];
          lights[idx].position.copy(satellite.position);
        });

        // Comete
        comets.forEach((comet, idx) => {
          comet.userData.angle += comet.userData.speed;
          const x = Math.cos(comet.userData.angle) * comet.userData.distance;
          const y = Math.sin(state.time * 0.0005) * 2;
          const z = Math.sin(comet.userData.angle) * comet.userData.distance;

          comet.position.set(x, y, z);
          comet.rotation.y += 0.02;

          // Scia cometa
          const trailPos = comet.userData.trailPositions;
          for (let i = trailPos.length - 3; i >= 3; i -= 3) {
            trailPos[i] = trailPos[i - 3];
            trailPos[i + 1] = trailPos[i - 2];
            trailPos[i + 2] = trailPos[i - 1];
          }
          trailPos[0] = x;
          trailPos[1] = y;
          trailPos[2] = z;

          comet.userData.trail.geometry.attributes.position.needsUpdate = true;

          // Aggiorna luci comete
          const cometLights = [cometLight1, cometLight2];
          cometLights[idx].position.copy(comet.position);
        });

        // Polvere spaziale
        dust.rotation.x += 0.00001;
        dust.rotation.y += 0.00003;

        // Nebula
        nebula.rotation.y += 0.00002;
        nebula.rotation.z += 0.00001;

        // Stelle
        starsMaterial.size = 0.12 + Math.sin(state.time * 0.001) * 0.04;
        stars.rotation.y += 0.00003;

        // Effetto parallax
        if (!state.isDragging) {
          state.targetRotation.x *= 0.95;
          state.targetRotation.y *= 0.95;
        }

        camera.position.x = state.panX;
        camera.position.y = state.panY + 0.5;
      }

      // ========== UPDATE INFO PANEL ==========
      document.getElementById('moonDistance').textContent = 
        'Distance: ' + (384400 - Math.random() * 100).toFixed(0) + ' km';
      document.getElementById('moonSpeed').textContent = 
        'Speed: ' + (1.022 + Math.sin(state.time * 0.001) * 0.01).toFixed(3) + ' km/s';
      document.getElementById('earthRotation').textContent = 
        'Rotation: ' + ((state.time * 0.5) % 360).toFixed(1) + '°';
      
      const date = new Date();
      document.getElementById('systemTime').textContent = 
        'Time: ' + date.getHours().toString().padStart(2, '0') + ':' + 
        date.getMinutes().toString().padStart(2, '0') + ':' + 
        date.getSeconds().toString().padStart(2, '0');
      
      document.getElementById('zoomLevel').textContent = 
        'Zoom: ' + camera.position.z.toFixed(2) + 'x';

      renderer.render(scene, camera);
    }

    animate();

    // ========== RESIZE ==========
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
